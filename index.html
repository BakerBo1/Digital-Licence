<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Digital Licence</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header>

        <button class="settings">
            <img src="images/settings-icon.png">
        </button>

    </header>

    <main>

        <h1>Good morning</h1>

        <div class="licence-card">

            <div class="licence-icon">

                <img src="images/car-icon.png">

            </div>

            <div class="licence-text">

                Driver Licence

            </div>

            <div class="arrow">

                <img src="images/right-arrow-icon.png">

            </div>

        </div>

        <h2>Services</h2>

        <div class="service-list">

            <div class="service">

                <div class="left">

                    <img src="images/maroon-qld-icon.png" class="service-icon">

                    <span>Check registration status</span>

                </div>

                <img src="images/box-arrow-icon.png" class="external">

            </div>

            <div class="service">

                <div class="left">

                    <img src="images/maroon-money-icon.png" class="service-icon">

                    <span>Renew registration</span>

                </div>

                <img src="images/box-arrow-icon.png" class="external">

            </div>

            <div class="service">

                <div class="left">

                    <img src="images/maroon-hammer-icon.png" class="service-icon">

                    <span>Pay a fine</span>

                </div>

                <img src="images/box-arrow-icon.png" class="external">

            </div>

            <div class="service">

                <div class="left">

                    <img src="images/maroon-location-icon.png" class="service-icon">

                    <span>Find a Customer Service Centre</span>

                </div>

                <img src="images/box-arrow-icon.png" class="external">

            </div>

        </div>

        <h2>Learn more about</h2>

        <div class="cards">

            <div class="card">

                <div class="card-image purple">

                    <img src="images/maroon-recyclable-arrows-icon.png">

                </div>

                <p>Register as an organ and tissue donor today</p>

            </div>

            <div class="card">

                <div class="photo"></div>

                <p>Disaster recovery support</p>

            </div>

            <div class="card">

                <div class="photo"></div>

                <p>More information</p>

            </div>

        </div>

    </main>

    <nav>

        <button>

            <img src="images/maroon-home-icon.png">

            <span>Home</span>

        </button>

        <button>

            <img src="images/wallet-icon.png">

            <span>Wallet</span>

        </button>

        <button>

            <img src="images/show-QR-icon.png">

            <span>Show QR</span>

        </button>

        <button>

            <img src="images/scan-qr-icon.png">

            <span>Scan QR</span>

        </button>

        <button>

            <img src="images/messages-icon.png">

            <span>Messages</span>

        </button>

    </nav>

</body>

</html>
