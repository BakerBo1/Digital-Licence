<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Digital Licence</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Header -->

    <header class="header">

        <button class="settings-btn">

            <img src="images/settings-icon.png" alt="Settings">

        </button>

    </header>

    <!-- Main -->

    <main class="main">

        <h1>Good morning</h1>

        <!-- Driver Licence -->

        <a href="pages/licence.html" class="licence-card">

            <div class="licence-left">

                <img src="images/car-icon.png" alt="Car">

            </div>

            <div class="licence-middle">

                <span>Driver Licence</span>

            </div>

            <div class="licence-right">

                <img src="images/right-arrow-icon.png" alt="Arrow">

            </div>

        </a>

        <!-- Services -->

        <h2>Services</h2>

        <section class="services">

            <div class="service">

                <div class="service-left">

                    <img src="images/maroon-qld-icon.png" alt="QLD">

                    <span>Check registration status</span>

                </div>

                <img class="external" src="images/box-arrow-icon.png" alt="Open">

            </div>

            <div class="service">

                <div class="service-left">

                    <img src="images/maroon-money-icon.png" alt="Money">

                    <span>Renew registration</span>

                </div>

                <img class="external" src="images/box-arrow-icon.png" alt="Open">

            </div>

            <div class="service">

                <div class="service-left">

                    <img src="images/maroon-hammer-icon.png" alt="Hammer">

                    <span>Pay a fine</span>

                </div>

                <img class="external" src="images/box-arrow-icon.png" alt="Open">

            </div>

            <div class="service">

                <div class="service-left">

                    <img src="images/maroon-location-icon.png" alt="Location">

                    <span>Find a Customer Service Centre</span>

                </div>

                <img class="external" src="images/box-arrow-icon.png" alt="Open">

            </div>

        </section>

        <!-- Learn More -->

        <h2>Learn more about</h2>

        <section class="learn-scroll">

            <div class="learn-card">

                <div class="learn-image donate">

                    <img src="images/maroon-recyclable-arrows-icon.png" alt="Donate">

                </div>

                <div class="learn-content">

                    <p>Register as an organ and tissue donor today</p>

                    <img src="images/box-arrow-icon.png" alt="Open">

                </div>

            </div>

            <div class="learn-card">

                <div class="learn-image image-two">

                </div>

                <div class="learn-content">

                    <p>Disaster recovery support</p>

                    <img src="images/box-arrow-icon.png" alt="Open">

                </div>

            </div>

            <div class="learn-card">

                <div class="learn-image image-three">

                </div>

                <div class="learn-content">

                    <p>More information</p>

                    <img src="images/box-arrow-icon.png" alt="Open">

                </div>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav class="bottom-nav">

        <button class="active">

            <img src="images/maroon-home-icon.png" alt="Home">

            <span>Home</span>

        </button>

        <button>

            <img src="images/wallet-icon.png" alt="Wallet">

            <span>Wallet</span>

        </button>

        <button>

            <img src="images/show-QR-icon.png" alt="Show QR">

            <span>Show QR</span>

        </button>

        <button>

            <img src="images/scan-qr-icon.png" alt="Scan QR">

            <span>Scan QR</span>

        </button>

        <button>

            <img src="images/messages-icon.png" alt="Messages">

            <span>Messages</span>

        </button>

    </nav>

</body>

</html>
