<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Licence</title>

    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->

    <header class="header">

        <button class="settings-btn">
            <img src="images/settings-icon.png" alt="Settings">
        </button>

    </header>

    <!-- Main -->

    <main class="main">

        <h1>Good morning</h1>

        <!-- Driver Licence -->

        <section class="licence-card">

            <div class="licence-left">

                <img src="images/car-icon.png" alt="Car">

            </div>

            <div class="licence-middle">

                <span>Driver Licence</span>

            </div>

            <div class="licence-right">

                <img src="images/right-arrow-icon.png" alt="Arrow">

            </div>

        </section>

        <!-- Services -->

        <h2>Services</h2>

        <section class="services">

            <div class="service">

                <div class="service-left">

                    <img src="images/maroon-qld-icon.png">

                    <span>Check registration status</span>

                </div>

                <img class="external" src="images/box-arrow-icon.png">

            </div>

            <div class="service">

                <div class="service-left">

                    <img src="images/maroon-money-icon.png">

                    <span>Renew registration</span>

                </div>

                <img class="external" src="images/box-arrow-icon.png">

            </div>

            <div class="service">

                <div class="service-left">

                    <img src="images/maroon-hammer-icon.png">

                    <span>Pay a fine</span>

                </div>

                <img class="external" src="images/box-arrow-icon.png">

            </div>

            <div class="service">

                <div class="service-left">

                    <img src="images/maroon-location-icon.png">

                    <span>Find a Customer Service Centre</span>

                </div>

                <img class="external" src="images/box-arrow-icon.png">

            </div>

        </section>

        <!-- Learn More -->

        <h2>Learn more about</h2>

        <section class="learn-scroll">

            <div class="learn-card">

                <div class="learn-image donate">

                    <img src="images/maroon-recyclable-arrows-icon.png">

                </div>

                <div class="learn-content">

                    <p>Register as an organ and tissue donor today</p>

                    <img src="images/box-arrow-icon.png">

                </div>

            </div>

            <div class="learn-card">

                <div class="learn-image image-two">

                </div>

                <div class="learn-content">

                    <p>Disaster recovery support</p>

                    <img src="images/box-arrow-icon.png">

                </div>

            </div>

            <div class="learn-card">

                <div class="learn-image image-three">

                </div>

                <div class="learn-content">

                    <p>More information</p>

                    <img src="images/box-arrow-icon.png">

                </div>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav class="bottom-nav">

        <button class="active">

            <img src="images/maroon-home-icon.png">

            <span>Home</span>

        </button>

        <button>

            <img src="images/wallet-icon.png">

            <span>Wallet</span>

        </button>

        <button>

            <img src="images/show-QR-icon.png">

            <span>Show QR</span>

        </button>

        <button>

            <img src="images/scan-qr-icon.png">

            <span>Scan QR</span>

        </button>

        <button>

            <img src="images/messages-icon.png">

            <span>Messages</span>

        </button>

    </nav>

</body>
</html>
